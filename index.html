<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hidratos Carbono</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
font-family:Arial;
margin:0;
background:#f0f2f5;
}

header{
background:#1e1e2f;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
gap:10px;
background:#2c2c3e;
padding:10px;
flex-wrap:wrap;
}

nav button{
padding:10px 15px;
border:none;
border-radius:8px;
background:white;
cursor:pointer;
font-weight:bold;
}

.pantalla{display:none;padding:20px}
.activa{display:block}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:900px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

textarea{height:120px}

.fila{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.fila input{flex:1}

.btn{
background:#4caf50;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-rojo{
background:#e74c3c;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

input[type="checkbox"]{
width:18px;
height:18px;
accent-color:#4caf50;
}

.oculto{display:none}
</style>
</head>

<body>

<header>🍽️ Gestor de Hidratos de Carbono</header>

<!-- LOGIN -->
<div id="login" class="pantalla activa">
<div class="card">
<h2>Iniciar sesión</h2>

<input id="mail" placeholder="Correo electrónico">
<input id="pass" type="password" placeholder="Contraseña">

<div class="fila">
<button class="btn" onclick="entrar()">Entrar</button>
<button class="btn" onclick="registrar()">Registrarse</button>
</div>

</div>
</div>

<!-- APP -->
<div id="app" class="oculto">

<nav>
<button onclick="ir('inicio')">INICIO</button>
<button onclick="ir('crear')">AÑADIR RECETAS</button>
<button onclick="ir('recetas')">VER RECETAS</button>
<button onclick="salir()">SALIR</button>
</nav>

<!-- INICIO -->
<div id="inicio" class="pantalla">
<div class="card">
Bienvenido.
</div>
</div>

<!-- CREAR -->
<div id="crear" class="pantalla">
<div class="card">

<input id="nombre" placeholder="Nombre receta">
<textarea id="texto" placeholder="Ejemplo:
arroz 100
leche 200"></textarea>

<input id="personas" type="number" placeholder="Raciones">

<div class="fila">
<label><input type="checkbox" id="checkTus" checked> Tus recetas</label>
<label><input type="checkbox" id="checkOnline"> Recetas online</label>
</div>

<br>
<button class="btn" onclick="guardarRecetaNueva()">Guardar receta</button>

</div>
</div>

<!-- RECETAS -->
<div id="recetas" class="pantalla">
<div class="card">

<h2>Tus recetas</h2>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Total HC</th>
<th>Por ración</th>
<th>❌</th>
</tr>
</thead>
<tbody id="tablaTus"></tbody>
</table>

<br><br>

<h2>Recetas online</h2>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Total HC</th>
<th>Por ración</th>
</tr>
</thead>
<tbody id="tablaOnline"></tbody>
</table>

</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBozzwT9hTW8TP1NCUWkKDJIN1JxQox_vY",
authDomain: "mi-web-hidratos.firebaseapp.com",
projectId: "mi-web-hidratos",
storageBucket: "mi-web-hidratos.firebasestorage.app",
messagingSenderId: "75949902551",
appId: "1:75949902551:web:c88713d1747ed1ea153e92"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let recetas = [];

window.ir = function(p){
document.querySelectorAll(".pantalla").forEach(x=>x.classList.remove("activa"));
document.getElementById(p).classList.add("activa");

if(p==="recetas") cargarRecetas();
}

window.registrar = async function(){
let email=document.getElementById("mail").value;
let pass=document.getElementById("pass").value;

try{
await createUserWithEmailAndPassword(auth,email,pass);
}catch(e){
alert(e.message);
}
}

window.entrar = async function(){
let email=document.getElementById("mail").value;
let pass=document.getElementById("pass").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
}catch(e){
alert(e.message);
}
}

window.salir = async function(){
await signOut(auth);
}

onAuthStateChanged(auth,(user)=>{

if(user){
document.getElementById("login").classList.remove("activa");
document.getElementById("login").style.display="none";

document.getElementById("app").classList.remove("oculto");

ir("inicio");

}else{
document.getElementById("app").classList.add("oculto");
document.getElementById("login").style.display="block";
document.getElementById("login").classList.add("activa");
}
});

window.guardarRecetaNueva = async function(){

let user = auth.currentUser;
if(!user) return;

let nombre=document.getElementById("nombre").value.trim();
let personas=parseFloat(document.getElementById("personas").value);

if(!nombre || !personas){
alert("Faltan datos");
return;
}

let total=0;
let pp=0;

let esTus=document.getElementById("checkTus").checked;
let esOnline=document.getElementById("checkOnline").checked;

let tipo=[];

if(esTus) tipo.push("tus");
if(esOnline) tipo.push("online");

await addDoc(collection(db,"recetas"),{
nombre,
personas,
total,
pp,
tipo,
uid:user.uid
});

alert("Guardada");

document.getElementById("nombre").value="";
document.getElementById("texto").value="";
document.getElementById("personas").value="";
}

async function cargarRecetas(){

let user=auth.currentUser;
if(!user) return;

let querySnapshot = await getDocs(collection(db,"recetas"));

let tus="";
let online="";

querySnapshot.forEach((docu)=>{

let r=docu.data();

if(r.tipo?.includes("tus") && r.uid===user.uid){
tus += `
<tr>
<td>${r.nombre}</td>
<td>${r.total}</td>
<td>${r.pp}</td>
<td><button class="btn-rojo" onclick="borrarReceta('${docu.id}')">❌</button></td>
</tr>
`;
}

if(r.tipo?.includes("online")){
online += `
<tr>
<td>${r.nombre}</td>
<td>${r.total}</td>
<td>${r.pp}</td>
</tr>
`;
}

});

document.getElementById("tablaTus").innerHTML=tus;
document.getElementById("tablaOnline").innerHTML=online;
}

window.borrarReceta = async function(id){
await deleteDoc(doc(db,"recetas",id));
cargarRecetas();
}

</script>
</body>
</html>
