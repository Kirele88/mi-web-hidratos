<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hidratos Carbono</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f0f2f5;}
header{background:#1e1e2f;color:white;padding:20px;text-align:center;font-size:22px;font-weight:bold;}
nav{display:flex;justify-content:center;gap:10px;background:#2c2c3e;padding:10px;flex-wrap:wrap;}
nav button{padding:10px 15px;border:none;border-radius:8px;background:white;cursor:pointer;font-weight:bold;}
.pantalla{display:none;padding:20px}
.activa{display:block}
.card{background:white;padding:20px;border-radius:15px;max-width:900px;margin:auto;}
input, textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
textarea{height:120px}
.btn{background:#4caf50;color:white;border:none;padding:8px;border-radius:8px;cursor:pointer;}
.btn-rojo{background:#e74c3c;color:white;border:none;padding:8px;border-radius:8px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{padding:10px;border-bottom:1px solid #ddd;text-align:center;}
</style>
</head>

<body>

<header>🍽️ Gestor de Hidratos</header>

<nav>
<button onclick="ir('inicio')">INICIO</button>
<button onclick="ir('crear')">AÑADIR</button>
<button onclick="ir('recetas')">RECETAS</button>
<button onclick="ir('ingredientes')">INGREDIENTES</button>
</nav>

<div id="inicio" class="pantalla activa"><div class="card">App funcionando con Firebase</div></div>

<div id="crear" class="pantalla">
<div class="card">
<input id="nombre" placeholder="Nombre receta">
<textarea id="texto"></textarea>
<input id="personas" type="number" placeholder="Raciones">
<button class="btn" onclick="calcular()">Calcular</button>
<div id="pregunta"></div>
</div>
</div>

<div id="recetas" class="pantalla">
<div class="card">
<table>
<thead><tr><th>Nombre</th><th>Total</th><th>PP</th><th>PDF</th><th>X</th></tr></thead>
<tbody id="tablaRecetas"></tbody>
</table>
</div>
</div>

<div id="ingredientes" class="pantalla">
<div class="card">
<input id="nomIng">
<input id="hcIng">
<button onclick="addIng()">Añadir</button>
<table><tbody id="tablaIng"></tbody></table>
</div>
</div>

<script>
let ingredientes = {};
let recetas = [];
let pendientes = [];
let datosTemp = null;

function guardar(){}

function ir(p){
document.querySelectorAll('.pantalla').forEach(x=>x.classList.remove('activa'));
document.getElementById(p).classList.add('activa');
mostrarRecetas();mostrarIng();
}

function calcular(){
let nombre=nombreInput();
let personas=parseFloat(document.getElementById('personas').value);
let lineas=document.getElementById('texto').value.split('\n');

pendientes=[];let lista=[];

lineas.forEach(l=>{
l=l.trim();if(!l)return;

let partes=l.split(" ");
let cant=parseFloat(partes.pop());
let nom=partes.join(" ");

if(!nom||isNaN(cant))return;

lista.push({nom,cant});
if(!ingredientes[nom])pendientes.push(nom);
});

datosTemp={lista,nombre,personas};
pendientes.length>0?preguntar():calcularFinal();
}

function nombreInput(){
return document.getElementById('nombre').value.trim();
}

function preguntar(){
let ing=pendientes.shift();
document.getElementById('pregunta').innerHTML=
`<input id="nuevo"><button onclick="guardarIng('${ing}')">OK</button>`;
}

function guardarIng(ing){
let v=parseFloat(document.getElementById('nuevo').value);
ingredientes[ing]=v;
guardarIngrediente(ing,v);
preguntar();
}

function calcularFinal(){
let total=0;

datosTemp.lista.forEach(i=>{
i.hc=(i.cant/ingredientes[i.nom])*10;
total+=i.hc;
});

let r={
nombre:datosTemp.nombre,
total,
pp:total/datosTemp.personas,
lista:datosTemp.lista,
personas:datosTemp.personas
};

recetas.push(r);
guardarReceta(r);
ir('recetas');
}

async function guardarReceta(r){
await addDoc(collection(db,"recetas"),r);
}

async function guardarIngrediente(n,v){
await addDoc(collection(db,"ingredientes"),{nombre:n,valor:v});
}

function mostrarRecetas(){
let t=document.getElementById('tablaRecetas');t.innerHTML='';
recetas.forEach((r,i)=>{
t.innerHTML+=`
<tr>
<td>${r.nombre}</td>
<td>${r.total.toFixed(2)}</td>
<td>${r.pp.toFixed(2)}</td>
<td><button onclick="pdf(${i})">PDF</button></td>
<td><button onclick="delRec(${i})">X</button></td>
</tr>`;
});
}

function mostrarIng(){
let t=document.getElementById('tablaIng');t.innerHTML='';
Object.keys(ingredientes).forEach(i=>{
t.innerHTML+=`<tr><td>${i}</td><td>${ingredientes[i]}</td><td><button onclick="delIng('${i}')">X</button></td></tr>`;
});
}

async function delRec(i){
let nombre=recetas[i].nombre;
recetas.splice(i,1);mostrarRecetas();

const q=await getDocs(collection(db,"recetas"));
q.forEach(doc=>{
if(doc.data().nombre===nombre)deleteDoc(doc.ref);
});
}

async function delIng(i){
delete ingredientes[i];mostrarIng();

const q=await getDocs(collection(db,"ingredientes"));
q.forEach(doc=>{
if(doc.data().nombre===i)deleteDoc(doc.ref);
});
}

function addIng(){
let n=document.getElementById('nomIng').value.trim();
let v=parseFloat(document.getElementById('hcIng').value);
if(!n||isNaN(v))return;

ingredientes[n]=v;
guardarIngrediente(n,v);
mostrarIng();

document.getElementById('nomIng').value='';
document.getElementById('hcIng').value='';
}

function pdf(i){
let r=recetas[i];
let w=window.open();
w.document.write(`<h1>${r.nombre}</h1><p>${r.total}</p>`);
w.print();
}

async function cargar(){
let r=await getDocs(collection(db,"recetas"));
r.forEach(d=>recetas.push(d.data()));

let i=await getDocs(collection(db,"ingredientes"));
i.forEach(d=>ingredientes[d.data().nombre]=d.data().valor);

mostrarRecetas();mostrarIng();
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIza...",
authDomain:"mi-web-hidratos.firebaseapp.com",
projectId:"mi-web-hidratos"
});

const db=getFirestore(app);

window.db=db;
window.addDoc=addDoc;
window.collection=collection;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;

cargar();
</script>

</body>
</html>
